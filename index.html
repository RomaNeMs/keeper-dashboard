<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Keeper</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Keeper">
<meta name="theme-color" content="#f0ebe3">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --bg: #f0ebe3; --paper: #faf7f2; --ink: #2c1a0e; --muted: #8a7060;
    --line: #cfc5b8; --accent: #0066CC; --red: #FF3B30; --red-light: #ffebe9;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased; }

  #gate { min-height: 100dvh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
  #gate.opening { opacity: 0.4; pointer-events: none; transition: opacity 200ms; }
  .card {
    width: 340px; max-width: 100%; text-align: center; background: var(--paper);
    border: 1px solid #e0d8ce; border-radius: 16px; padding: 36px 30px 26px;
    box-shadow: 0 1px 2px rgba(44,26,14,0.05), 0 4px 16px rgba(44,26,14,0.07);
  }
  .card.shake { animation: shake .4s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  .mark { width: 54px; height: 54px; border-radius: 13px; margin: 0 auto 14px;
    background: linear-gradient(180deg, #2b86e4, #005cba);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 2px 6px rgba(0,102,204,0.32);
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 12px; box-sizing: border-box; }
  .mark span { border-radius: 3px; }
  .mark span:nth-child(1) { background: rgba(255,255,255,0.93); }
  .mark span:nth-child(2) { background: rgba(255,255,255,0.57); }
  .mark span:nth-child(3) { background: rgba(255,255,255,0.57); }
  .mark span:nth-child(4) { background: rgba(255,255,255,0.31); }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 0 0 6px; }
  p  { color: var(--muted); font-size: 13px; margin: 0 0 20px; line-height: 1.5; }
  input {
    width: 100%; box-sizing: border-box; font-size: 20px; text-align: center; letter-spacing: 6px;
    padding: 12px; border: 1px solid var(--line); border-radius: 10px; outline: none;
    background: var(--bg); margin-bottom: 12px; color: var(--ink);
    font-family: 'SF Mono', ui-monospace, monospace;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,102,204,0.12); }
  input.err { border-color: var(--red); background: var(--red-light); }
  button {
    width: 100%; padding: 12px; font-size: 14px; font-weight: 600; color: #fff;
    border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(180deg, #1a79dd, #0060c0);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 2px 6px rgba(0,102,204,0.32);
  }
  button:active { transform: scale(0.97); }
  .hint { font-size: 10px; color: #b8a898; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 16px;
    font-family: 'SF Mono', ui-monospace, monospace; }
  .setup { text-align: left; font-size: 13px; line-height: 1.6; color: var(--ink); }
  .setup code { background: rgba(0,102,204,0.08); border-radius: 4px; padding: 1px 5px; font-size: 12px; }
</style>
</head>
<body>

<div id="gate">
  <form class="card" id="card" onsubmit="return go(event)">
    <div class="mark"><span></span><span></span><span></span><span></span></div>
    <h1>Keeper</h1>
    <div id="body">
      <p>Enter the family passcode to open the dashboard on this device.</p>
      <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="passcode" autofocus>
      <button type="submit">Unlock</button>
      <div class="hint">Remembered on this device after first unlock</div>
    </div>
  </form>
</div>

<script>
// ── Encrypted vault ─────────────────────────────────────────────────────────
// Generate this block with encrypt-tool.html (it encrypts your /exec URL with
// your passcode). Until you paste it, this page shows setup instructions.
const VAULT = { salt: "ncCgQeuDF2XwoB7bdDtcKw==", iv: "03CALX46wkiW2q/p", data: "afGXqgoaiBr+rMVbOWzRThEzpmZrsGJ6bbTP7/JRYDT3wBiDlR6eiuy8rQ6uUItfHTi6JStHFsRpEYsxsuMf+R+bBSkIUpoU/uKOYKiiGnQ9mZkwPd+pAOPCk3X4OkX+GF51U60BB5QyarZuXG8NfRXhWKQkfkB9BXlenaZwqGCPkUUJitDiUXH4PFOJ6nIXXnvIESRPJi7DYLztw3Jf/SVClk0p2Ep8O4kjRHlKjvDIASaN5A==" };

const LS_KEY = 'studio.exec.url';

function b64d(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}

async function decryptVault(pass) {
  const key = await deriveKey(pass, b64d(VAULT.salt));
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(VAULT.iv) }, key, b64d(VAULT.data));
  return new TextDecoder().decode(plain);
}

function mount(url) {
  // Google now sends X-Frame-Options/CSP on every response, so the dashboard
  // can no longer be embedded in an iframe from this origin — navigate to it
  // top-level instead. iOS keeps this inside the installed home-screen app
  // (no Safari chrome appears) since it's a same-tab navigation, not a new tab.
  document.getElementById('gate').classList.add('opening');
  window.location.replace(url);
}

async function go(e) {
  e.preventDefault();
  const pw = document.getElementById('pw');
  try {
    const url = await decryptVault(pw.value);
    try { localStorage.setItem(LS_KEY, url); } catch (_) {}
    mount(url);
  } catch (_) {
    const card = document.getElementById('card');
    pw.classList.add('err'); card.classList.add('shake');
    pw.value = '';
    setTimeout(() => { pw.classList.remove('err'); card.classList.remove('shake'); }, 500);
  }
  return false;
}

// Boot: setup notice → remembered device (installed app only) → passcode gate
//
// Only auto-skip the gate when running as the INSTALLED home-screen app
// (navigator.standalone). A plain Safari tab always shows the gate — that
// way "Add to Home Screen" reliably captures THIS page (with our icon),
// never the dashboard's script.google.com URL it would otherwise redirect to.
(function () {
  if (!VAULT) {
    document.getElementById('body').innerHTML =
      '<div class="setup">Almost there — open <code>encrypt-tool.html</code> on your Mac, ' +
      'encrypt your dashboard URL with a passcode, and paste the generated block into ' +
      '<code>index.html</code> where it says <code>const VAULT = null</code>.</div>';
    return;
  }
  const isStandalone = window.navigator.standalone === true;
  if (isStandalone) {
    let saved = null;
    try { saved = localStorage.getItem(LS_KEY); } catch (_) {}
    if (saved) mount(saved);
  }
})();
</script>
</body>
</html>
